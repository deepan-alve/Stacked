services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stacked-backend
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/data/movies.db
      - SUPABASE_DB_HOST=${STACKED_DB_HOST}
      - SUPABASE_DB_PORT=5432
      - SUPABASE_DB_NAME=postgres
      - SUPABASE_DB_USER=postgres
      - SUPABASE_DB_PASSWORD=${STACKED_DB_PASSWORD}
      - BACKUP_INTERVAL_HOURS=6
    volumes:
      - ./data:/data
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:3000/api/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    container_name: stacked-frontend
    healthcheck:
      test: ["CMD", "curl", "-q", "http://localhost:80"]
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.stacked-frontend.rule=Host(`stacked.deepanalve.dev`)"
      - "traefik.docker.network=traefik_net"
      - "traefik.http.services.stacked-frontend.loadbalancer.server.port=80"
      - "traefik.http.routers.stacked-frontend.entrypoints=websecure"
      - "traefik.http.routers.stacked-frontend.tls=true"
      - "traefik.http.routers.stacked-frontend.tls.certresolver=le"
    networks:
      - default
      - traefik_net

networks:
  traefik_net:
    external: true
